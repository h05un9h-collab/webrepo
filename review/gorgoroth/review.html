<!--
노르웨이 출신의 블랙 메탈 밴드 GORGOROTH의 신작으로 통산 6번째 정규 앨범…
이미 5장의 앨범을 발표한 베테랑 밴드이건만, 난 이 앨범으로 처음을 이들을 접하게 되었다. 이들은 1992년 결성되었다고 한다.　1993년 첫번째 데모 [A Sorcery Written In Blood]를 시작으로 지금까지 총 5장의 정규앨범([Pentagram],[Antichrist],[Under The Sign Of Hell],[Destroyer],[Incipit Satan])을 발표했고 1996년에는 미니앨범 [The Last Tormentor]도 발표했다고 한다. 알게모르게 많이도 발표했다.
1997년 지금의 ‘NUCLEAR BLAST’와 계약후, 세 번째 앨범이 되는 이 신작의 일반적인 평은 초기의 사운드로 되돌아가고 있다는 것이었다. 이전 앨범들을 들어보지 않아서 뚜렷하게 이미지가 떠오르지 않지만 이 앨범만 놓고 본다면 선호하는 스타일은 아니다. 아는 사람은 알겠지만 난 아무리 좋은 앨범이라도 각 악기의 사운드가 한데 뭉쳐있는 스타일을 결코 좋아하지 않기 때문이다. 전체적으로는 약간 올드 테이스트가 느껴지는 노이지 사운드로 아쉽게도 기타사운드가 깊숙히 박혀있어, 트레몰로 주법의 멜로디 라인을 찾아 즐기는데는 한고생한다. 여기에 역시 노이지한 드럼과 베이스가 한데 뭉치며 얼핏들으면 ‘웅웅~’거리기만 할뿐이다. 이런 답답한 사운드와는 대조적인 것이 보컬이다. 마치 DARK FUNERAL의 Magnus처럼 고막을 찢을듯한 기세로 전율을 느끼게만드는 예리함이 있다.
